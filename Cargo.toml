[workspace]
resolver = "3"
members = [
    "common",
    "collector",
    "mqtt_sim"
]

[workspace.dependencies]
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", default-features = true, features = ["local-time"] }
anyhow = "1.0.99"

[profile.dev.package.sqlx-macros]
opt-level = 3
